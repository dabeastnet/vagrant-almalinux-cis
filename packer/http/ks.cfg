# =============================================================================
# AlmaLinux 9 Kickstart — CIS Level 2 baseline partitioning + security
# Used by: packer/alma9-cis.pkr.hcl  (QEMU/libvirt builder)
#
# Disk layout (40 GB sda):
#   /boot            1 024 MB  xfs     (non-LVM, required for GRUB)
#   LVM VG almalinux on the rest:
#     swap           2 048 MB
#     /              10 240 MB xfs
#     /home           5 120 MB xfs     nodev
#     /tmp            2 048 MB xfs     nodev,nosuid,noexec
#     /var            8 192 MB xfs
#     /var/tmp        2 048 MB xfs     nodev,nosuid,noexec
#     /var/log        4 096 MB xfs
#     /var/log/audit  4 096 MB xfs
#   Total:           ~39 GB
# =============================================================================

text
reboot

# ── Installation source ────────────────────────────────────────────────────
url --url="https://repo.almalinux.org/almalinux/9/BaseOS/x86_64/os/"
repo --name="AppStream" --baseurl="https://repo.almalinux.org/almalinux/9/AppStream/x86_64/os/"
repo --name="extras" --baseurl="https://repo.almalinux.org/almalinux/9/extras/x86_64/os/"

# ── Locale / keyboard / time ───────────────────────────────────────────────
lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'
timezone UTC --utc

# ── Network ───────────────────────────────────────────────────────────────
network --bootproto=dhcp --device=link --activate
network --hostname=alma9-cis

# ── Credentials ───────────────────────────────────────────────────────────
# Vagrant convention: both root and vagrant use 'vagrant' in dev.
# CHANGE THESE IN PRODUCTION.
rootpw --plaintext vagrant
user --name=vagrant --groups=wheel --password=vagrant --plaintext

# ── Security settings ─────────────────────────────────────────────────────
selinux --enforcing
firewall --enabled --service=ssh

# ── Disk layout ───────────────────────────────────────────────────────────
zerombr
clearpart --all --initlabel --drives=sda
bootloader --location=mbr --driveorder=sda --boot-drive=sda

# Physical partitions
part /boot  --fstype=xfs  --size=1024  --ondisk=sda  --label=boot
part pv.01  --size=1      --grow       --ondisk=sda

# LVM
volgroup almalinux pv.01

logvol swap              --vgname=almalinux --size=2048  --name=swap
logvol /                 --vgname=almalinux --size=10240 --name=root        --fstype=xfs
logvol /home             --vgname=almalinux --size=5120  --name=home        --fstype=xfs --fsoptions="nodev"
logvol /tmp              --vgname=almalinux --size=2048  --name=tmp         --fstype=xfs --fsoptions="nodev,nosuid,noexec"
logvol /var              --vgname=almalinux --size=8192  --name=var         --fstype=xfs
logvol /var/tmp          --vgname=almalinux --size=2048  --name=vartmp      --fstype=xfs --fsoptions="nodev,nosuid,noexec"
logvol /var/log          --vgname=almalinux --size=4096  --name=varlog      --fstype=xfs
logvol /var/log/audit    --vgname=almalinux --size=4096  --name=varlogaudit --fstype=xfs

# ── Package selection ─────────────────────────────────────────────────────
%packages --ignoremissing --excludedocs
@^minimal-environment
aide
audit
openscap
openscap-scanner
scap-security-guide
libselinux-utils
policycoreutils
policycoreutils-python-utils
selinux-policy-targeted
chrony
rsyslog
rsyslog-gnutls
firewalld
iptables
pam_pwquality
libpwquality
python3
python3-libselinux
python3-rpm
vim-minimal
wget
curl
rsync
net-tools
bind-utils
openssh-server
openssh-clients
sudo
-telnet-server
-telnet
-rsh-server
-rsh
-ypbind
-ypserv
-tftp
-tftp-server
-talk
-talk-server
-xinetd
-sendmail
-cups
-avahi
-dhcp-server
-samba
-samba-common
-nfs-utils
-rpcbind
-postfix
%end

# ── Post-install ──────────────────────────────────────────────────────────
%post --log=/root/ks-post.log
set -x

# ─── Vagrant SSH key ───────────────────────────────────────────────────────
mkdir -pm 700 /home/vagrant/.ssh
# Hashicorp insecure public key — Vagrant replaces this on first boot
cat > /home/vagrant/.ssh/authorized_keys << 'SSHEOF'
ssh-rsa  vagrant insecure public key
SSHEOF
chmod 0600 /home/vagrant/.ssh/authorized_keys
chown -R vagrant:vagrant /home/vagrant/.ssh

# ─── Passwordless sudo for vagrant ────────────────────────────────────────
echo "vagrant ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/vagrant
chmod 0440 /etc/sudoers.d/vagrant

# ─── SSH daemon: no root login, allow key auth ────────────────────────────
sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/'           /etc/ssh/sshd_config
sed -i 's/^#\?PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config

# ─── Enable required services ─────────────────────────────────────────────
systemctl enable auditd chronyd firewalld rsyslog

# ─── Disable services not needed ──────────────────────────────────────────
for svc in postfix avahi-daemon cups bluetooth rpcbind; do
    systemctl disable "$svc" 2>/dev/null || true
done

# ─── /dev/shm CIS 1.1.16-18: nodev,nosuid,noexec ────────────────────────
grep -q '/dev/shm' /etc/fstab || \
    echo "tmpfs /dev/shm tmpfs defaults,nodev,nosuid,noexec 0 0" >> /etc/fstab

# ─── Kernel module deny-list (CIS 1.1.1.x) ───────────────────────────────
cat > /etc/modprobe.d/cis-modules.conf << 'EOF'
# CIS 1.1.1.1 - Disable cramfs
install cramfs /bin/false
# CIS 1.1.1.2 - Disable squashfs
install squashfs /bin/false
# CIS 1.1.1.3 - Disable udf
install udf /bin/false
# CIS 3.4.x - Disable uncommon network protocols
install dccp /bin/false
install sctp /bin/false
install rds  /bin/false
install tipc /bin/false
EOF

# ─── Kernel hardening via sysctl (CIS 3.x, 1.5.x) ───────────────────────
cat > /etc/sysctl.d/99-cis.conf << 'EOF'
# CIS 3.1.1 Disable IP forwarding
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0
# CIS 3.1.2 Disable send redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
# CIS 3.2.1 Disable source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0
# CIS 3.2.2 Disable ICMP redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
# CIS 3.2.4 Log suspicious packets
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1
# CIS 3.2.5 Ignore broadcast ICMP
net.ipv4.icmp_echo_ignore_broadcasts = 1
# CIS 3.2.6 Ignore bogus ICMP responses
net.ipv4.icmp_ignore_bogus_error_responses = 1
# CIS 3.2.7 Enable reverse path filtering
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
# CIS 3.2.8 Enable TCP SYN cookies
net.ipv4.tcp_syncookies = 1
# CIS 3.3 IPv6 RA
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0
# CIS 1.5.2 Restrict core dumps
fs.suid_dumpable = 0
# CIS 1.5.3 ASLR
kernel.randomize_va_space = 2
# Additional hardening
kernel.dmesg_restrict = 1
kernel.kptr_restrict = 2
kernel.yama.ptrace_scope = 1
fs.protected_symlinks = 1
fs.protected_hardlinks = 1
EOF

sysctl --system 2>/dev/null || true

# ─── Login banner (CIS 1.8.x) ─────────────────────────────────────────────
BANNER="Authorized use only. All activity may be monitored and reported."
echo "$BANNER" > /etc/issue
echo "$BANNER" > /etc/issue.net
cat > /etc/motd << 'MOTDEOF'

  AlmaLinux 9 — CIS Level 2 Hardened
  Authorized use only. All activity is monitored.

MOTDEOF

# ─── /etc/login.defs hardening (CIS 5.4.x) ───────────────────────────────
sed -i 's/^PASS_MAX_DAYS.*/PASS_MAX_DAYS   365/'  /etc/login.defs
sed -i 's/^PASS_MIN_DAYS.*/PASS_MIN_DAYS   1/'    /etc/login.defs
sed -i 's/^PASS_WARN_AGE.*/PASS_WARN_AGE   7/'    /etc/login.defs

# ─── Password quality (CIS 5.3.x) ────────────────────────────────────────
cat > /etc/security/pwquality.conf << 'EOF'
minlen = 14
minclass = 4
dcredit = -1
ucredit = -1
ocredit = -1
lcredit = -1
maxrepeat = 3
maxsequence = 4
EOF

echo "=== KS post-install complete ===" >> /root/ks-post.log
%end
