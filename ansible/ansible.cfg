[defaults]
# When running via Vagrant ansible_local, the working dir is /vagrant
roles_path        = /vagrant/ansible/roles
collections_paths = /usr/share/ansible/collections
inventory         = /tmp/vagrant-ansible/inventory
retry_files_enabled = false
host_key_checking  = false
stdout_callback    = yaml
# Reduce verbosity for provisioning
display_skipped_hosts = false

[privilege_escalation]
become       = true
become_method = sudo
become_user  = root
become_ask_pass = false

[ssh_connection]
pipelining = true
