---
- name: reload sshd
  ansible.builtin.service:
    name: sshd
    state: reloaded

- name: restart auditd
  ansible.builtin.command: service auditd restart
  # auditd cannot be restarted via systemctl in a container/VM directly

- name: reload sysctl
  ansible.builtin.command: sysctl --system

- name: restart firewalld
  ansible.builtin.service:
    name: firewalld
    state: restarted

- name: restart rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: restarted
